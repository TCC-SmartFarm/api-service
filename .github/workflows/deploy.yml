name: Build & Push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tcc-smartfarm/api-service:latest
            ghcr.io/tcc-smartfarm/api-service:${{ github.sha }}

  # Avisa o repo backend que há imagem nova — ele faz o deploy na VM
  trigger-deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          repository: TCC-SmartFarm/backend
          event-type: deploy
          client-payload: '{"service": "api-service", "sha": "${{ github.sha }}"}'
